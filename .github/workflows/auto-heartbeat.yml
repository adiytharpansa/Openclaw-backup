name: 💓 Auto Heartbeat

on:
  schedule:
    # Send heartbeat every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  send-heartbeat:
    name: Send Heartbeat
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      
      - name: Update heartbeat
        run: |
          echo "Sending heartbeat..."
          date +%s > .heartbeat
          echo "Heartbeat sent at $(date)"
      
      - name: Commit and push
        run: |
          git config --local user.email "openclaw@github-actions"
          git config --local user.name "OpenClaw Heartbeat"
          git add .heartbeat
          git commit -m "💓 Auto-heartbeat $(date)" || echo "No changes"
          git push || echo "Push done"
      
      - name: Status
        run: |
          echo "## 💓 Auto Heartbeat Status"
          echo ""
          echo "| Item | Status |"
          echo "|------|--------|"
          echo "| Heartbeat | ✅ Sent |"
          echo "| Time | $(date) |"
          echo "| Next | 5 minutes |"
          echo ""
          echo "**Dead Man's Switch: ACTIVE**"
