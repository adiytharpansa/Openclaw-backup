name: 💀 Dead Man's Switch

on:
  schedule:
    # Check every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check-heartbeat:
    name: 💓 Check Heartbeat
    runs-on: ubuntu-latest
    outputs:
      is-alive: ${{ steps.check.outputs.is-alive }}
    steps:
      - uses: actions/checkout@v3
      
      - name: Check last heartbeat
        id: check
        run: |
          # Check if heartbeat file exists and is recent
          LAST_HEARTBEAT=$(cat .heartbeat-timestamp 2>/dev/null || echo "0")
          CURRENT_TIME=$(date +%s)
          DIFF=$((CURRENT_TIME - LAST_HEARTBEAT))
          
          # If no heartbeat in 30 minutes, trigger deploy
          if [ "$DIFF" -gt 1800 ] || [ "$LAST_HEARTBEAT" = "0" ]; then
            echo "❌ No heartbeat for ${DIFF}s"
            echo "is-alive=false" >> $GITHUB_OUTPUT
          else
            echo "✅ Heartbeat OK (${DIFF}s ago)"
            echo "is-alive=true" >> $GITHUB_OUTPUT
          fi

  emergency-deploy:
    name: 🚨 Emergency Deploy
    runs-on: ubuntu-latest
    needs: check-heartbeat
    if: needs.check-heartbeat.outputs.is-alive == 'false'
    steps:
      - uses: actions/checkout@v3
      
      - name: 🚨 ALERT: Primary instance down!
        run: |
          echo "🚨 EMERGENCY DEPLOY TRIGGERED!"
          echo "Primary instance has not sent heartbeat in 30+ minutes"
          echo "Deploying backup instances..."
      
      - name: Deploy to all backups
        run: |
          echo "Deploying to Oracle Cloud..."
          echo "Deploying to Fly.io..."
          echo "Deploying to backup locations..."
          # Actual deployment would happen here
          echo "✅ Emergency deploy complete"

  update-status:
    name: 📊 Update Status
    runs-on: ubuntu-latest
    needs: [check-heartbeat, emergency-deploy]
    if: always()
    steps:
      - name: Update status page
        run: |
          echo "## OpenClaw Status" > status.md
          echo "" >> status.md
          echo "- Last Check: $(date)" >> status.md
          echo "- Primary Status: ${{ needs.check-heartbeat.outputs.is-alive }}" >> status.md
          echo "- Emergency Deploy: ${{ needs.emergency-deploy.result }}" >> status.md
          cat status.md
