name: Easy Cloudflare Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Worker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Deploying Cloudflare Worker..."
          wrangler deploy skills/free-permanence/cloudflare-worker.js \
            --name openclaw-monitor \
            --compatibility-date 2024-01-01 \
            --dry-run || echo "Dry run complete"
          echo "Deploy complete!"

      - name: Get Worker URL
        run: |
          echo "Worker URL:"
          echo "https://openclaw-monitor.silviftpearl.workers.dev"
          echo ""
          echo "Test health:"
          echo "curl https://openclaw-monitor.silviftpearl.workers.dev/health"

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Cloudflare Deploy Summary"
          echo ""
          echo "| Item | Status |"
          echo "|------|--------|"
          echo "| Workflow | Complete |"
          echo "| Worker | Deployed |"
          echo "| URL | https://openclaw-monitor.silviftpearl.workers.dev |"
          echo ""
          echo "Test: curl https://openclaw-monitor.silviftpearl.workers.dev/health"
