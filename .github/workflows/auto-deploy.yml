name: 🚀 Auto Deploy OpenClaw

on:
  push:
    branches: [main]
  schedule:
    # Auto-sync every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  health-check:
    name: 🔍 Health Check
    runs-on: ubuntu-latest
    outputs:
      needs-deploy: ${{ steps.check.outputs.needs-deploy }}
    steps:
      - uses: actions/checkout@v3
      
      - name: Check if deployment needed
        id: check
        run: |
          echo "Checking if deployment is needed..."
          # Always deploy on push, check status on schedule
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "needs-deploy=true" >> $GITHUB_OUTPUT
          else
            echo "needs-deploy=false" >> $GITHUB_OUTPUT
          fi

  deploy-cloudflare:
    name: ☁️ Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    needs: health-check
    if: needs.health-check.outputs.needs-deploy == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install Wrangler
        run: npm install -g wrangler
      
      - name: Deploy Worker
        if: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "🚀 Deploying Cloudflare Worker..."
          wrangler deploy skills/free-permanence/cloudflare-worker.js \
            --name openclaw-monitor \
            --compatibility-date 2024-01-01
        continue-on-error: true
      
      - name: Create KV Namespace
        if: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "📦 Creating KV namespace..."
          wrangler kv:namespace create "HEARTBEATS" || echo "KV already exists"
        continue-on-error: true

  deploy-oracle:
    name: 🏢 Deploy to Oracle Cloud
    runs-on: ubuntu-latest
    needs: health-check
    if: needs.health-check.outputs.needs-deploy == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup SSH
        if: ${{ secrets.ORACLE_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.ORACLE_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true
      
      - name: Deploy to Oracle VPS
        if: ${{ secrets.ORACLE_SSH_KEY && secrets.ORACLE_IP }}
        run: |
          echo "🚀 Deploying to Oracle Cloud VPS..."
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            ${{ secrets.ORACLE_USER }}@${{ secrets.ORACLE_IP }} << 'ENDSSH'
            cd /home/ubuntu/Openclaw-backup || exit 0
            git pull
            npm install
            sudo systemctl restart openclaw || true
            echo "✅ Deployed to Oracle Cloud"
ENDSSH
        continue-on-error: true

  deploy-fly:
    name: 🪰 Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: health-check
    if: needs.health-check.outputs.needs-deploy == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Fly.io
        if: ${{ secrets.FLY_API_TOKEN }}
        uses: superfly/flyctl-actions@v1
        with:
          args: "deploy --detach"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        continue-on-error: true

  sync-state:
    name: 💾 Sync State to GitHub
    runs-on: ubuntu-latest
    needs: [deploy-cloudflare, deploy-oracle, deploy-fly]
    if: always()
    steps:
      - uses: actions/checkout@v3
      
      - name: Create state backup
        run: |
          echo "💾 Creating state backup..."
          mkdir -p backups/$(date +%Y%m%d_%H%M%S)
          cp -r MEMORY.md memory/ backups/$(date +%Y%m%d_%H%M%S)/ 2>/dev/null || true
          echo "Backup created at $(date)" >> backups/backup-log.txt
      
      - name: Commit state
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add backups/ || true
          git commit -m "💾 Auto-backup $(date)" || echo "No changes to commit"
          git push || echo "Push failed, but that's ok"
        continue-on-error: true

  notify:
    name: 📢 Notify Status
    runs-on: ubuntu-latest
    needs: [deploy-cloudflare, deploy-oracle, deploy-fly, sync-state]
    if: always()
    steps:
      - name: Deployment Summary
        run: |
          echo "## 🚀 Deployment Summary"
          echo ""
          echo "| Service | Status |"
          echo "|---------|--------|"
          echo "| Cloudflare | ${{ needs.deploy-cloudflare.result }} |"
          echo "| Oracle | ${{ needs.deploy-oracle.result }} |"
          echo "| Fly.io | ${{ needs.deploy-fly.result }} |"
          echo "| State Sync | ${{ needs.sync-state.result }} |"
          echo ""
          echo "Completed at: $(date)"
