# Docker Compose - Full Enterprise Stack
# Run: docker-compose up -d

version: "3.9"

services:
  # ==================== DATABASES ====================
  
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: clawdb
      POSTGRES_USER: clawd
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./databases/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - clawdb-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clawd"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - clawdb-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:6
    environment:
      MONGO_INITDB_ROOT_USERNAME: clawd
      MONGO_INITDB_ROOT_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      - mongodb_data:/data/db
    networks:
      - clawdb-network

  weaviate:
    image: semitechnologies/weaviate:latest
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "false"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "text2vec-transformers"
    volumes:
      - weaviate_data:/var/lib/weaviate
    networks:
      - clawdb-network

  # ==================== SEARCH ====================
  
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD_FILE=/run/secrets/es_password
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - clawdb-network
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'status.*green\\|status.*yellow'"]
      interval: 30s
      timeout: 30s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:latest
    environment:
      MEILI_MASTER_KEY_FILE: /run/secrets/meili_key
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - clawdb-network

  # ==================== MESSAGE QUEUE ====================
  
  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: clawd
      RABBITMQ_DEFAULT_PASS_FILE: /run/secrets/rabbit_password
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - clawdb-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ==================== API GATEWAY ====================
  
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://clawd:pass@postgres:5432/clawdb
      - REDIS_URL=redis://redis:6379
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    depends_on:
      - postgres
      - redis
      - elasticsearch
    networks:
      - clawdb-network
    restart: unless-stopped

  # ==================== MONITORING ====================
  
  prometheus:
    image: prom/prometheus:v2.47.0
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "9090:9090"
    networks:
      - clawdb-network

  grafana:
    image: grafana/grafana:10.1.0
    environment:
      - GF_SECURITY_ADMIN_PASSWORD_FILE=/run/secrets/grafana_password
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - clawdb-network

  node-exporter:
    image: prom/node-exporter:latest
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - clawdb-network

  # ==================== LOGGING ====================
  
  elasticsearch-logging:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
    volumes:
      - elk_es_data:/usr/share/elasticsearch/data
    networks:
      - clawdb-network

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    volumes:
      - ./monitoring/logstash/pipeline:/usr/share/logstash/pipeline
    depends_on:
      - elasticsearch-logging
    networks:
      - clawdb-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch-logging:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch-logging
    networks:
      - clawdb-network

  # ==================== UTILITIES ====================
  
  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@clawd.ai
      PGADMIN_DEFAULT_PASSWORD_FILE: /run/secrets/pgadmin_password
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - clawdb-network

  redis-commander:
    image: rediscommander/redis-commander:latest
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - clawdb-network

networks:
  clawdb-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  mongodb_data:
  weaviate_data:
  elasticsearch_data:
  meilisearch_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
  elk_es_data:
  pgadmin_data:

secrets:
  db_password:
    file: ./secrets/db_password.txt
  es_password:
    file: ./secrets/es_password.txt
  meili_key:
    file: ./secrets/meili_key.txt
  rabbit_password:
    file: ./secrets/rabbit_password.txt
  grafana_password:
    file: ./secrets/grafana_password.txt
  pgadmin_password:
    file: ./secrets/pgadmin_password.txt
