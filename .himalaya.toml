[general]
# Email account name
name = "Sanz"

# Your email address
email = "adiyth.arpansa@gmail.com"

# Default mailbox to select
mailbox = "INBOX"

# Number of envelope items to fetch per request
envelope-req-size = 20

[backend]
# Backend type (currently only "imap" is supported)
type = "imap"

[imap]
# IMAP server
host = "imap.gmail.com"

# IMAP port (993 for SSL, 143 for STARTTLS)
port = 993

# Security (SSL, Starttls, or None)
security = "SSL"

# Authentication type (Plain, Login, or OAuth2)
auth = "Plain"

# Your email (for login)
user = "adiyth.arpansa@gmail.com"

# App Password (NOT your regular password!)
# Get from: https://myaccount.google.com/apppasswords
pass = ""

[smtp]
# SMTP server for sending emails
host = "smtp.gmail.com"

# SMTP port (465 for SSL, 587 for STARTTLS)
port = 465

# Security (SSL, Starttls, or None)
security = "SSL"

# Authentication type
auth = "Plain"

# Your email (for login)
user = "adiyth.arpansa@gmail.com"

# App Password (same as IMAP)
pass = ""
